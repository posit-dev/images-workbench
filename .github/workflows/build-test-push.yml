on:
  pull_request:
  push:
    branches:
      - main

name: Build, Test, and Push
jobs:
  build-test-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest-4x
    steps:

      - name: GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: posit-dev
          repositories: |
            images-workbench
            images-shared
            pti

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Posit Bakery
        run: |
          gh auth login -p https --with-token <<< "${{ steps.app-token.outputs.token }}"
          gh auth setup-git
          pipx install 'git+https://github.com/posit-dev/images-shared.git@main#subdirectory=posit-bakery&egg=posit-bakery'

      - name: Install goss and dgoss
        uses: posit-dev/images-shared/setup-goss@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          just download-pti
          bakery build --load

      - name: Test images
        run: |
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss

      - name: Push images
        env:
          GIT_SHA: ${{ github.sha }}
        if: github.event_name == 'push'
        run: bakery build --push
