#######################################################################################################################
# BAKERY REPOSITORY CONFIG
#
# This file is used to define global properties for builds inside a repo managed by Posit's Bakery tool.
#######################################################################################################################

# Define properties of the local repository. This information will be used when labeling image builds.
repository:
  url: "github.com/posit-dev/images-workbench"
  vendor: "Posit Software, PBC"
  maintainer: "Posit Docker Team <docker@posit.co>"
  authors:
    - name: Ian H. Pittwood
      email: ian.pittwood@posit.co
    - name: Ben Schwedler
      email: ben@posit.co

# Define image registries used by builds in this repository. Images will be tagged appropriately for each registry.
# Logins for private registries should be managed independently of Bakery.
registries:
  - host: "docker.io"
    namespace: "posit"
  - host: "ghcr.io"
    namespace: "posit-dev"

images:
  - name: workbench
    displayName: "Posit Workbench"
    description: "A containerized image of Posit Workbench (PWB). Posit Workbench
      delivers RStudio, Jupyter, VS Code, and the new Positron IDE all in one place.
      It gives data teams the IDEs they love, and IT the control and governance needed
      for secure, compliant work."
    documentationUrl: "https://docs.posit.co/ide/server-pro/"
    buildSecrets:
      - id: github_token
        envVar: GITHUB_TOKEN
    dependencyConstraints:
      - dependency: R
        constraint:
          latest: true
      - dependency: python
        constraint:
          latest: true
    variants:
      - name: Standard
        extension: std
        tagDisplayName: std
        primary: true
        options:
          - tool: goss
            wait: 15
            command: "/usr/bin/supervisord -c /etc/supervisor/supervisord.conf"
      - name: Minimal
        extension: min
        tagDisplayName: min
    devVersions:
      - sourceType: stream
        product: workbench
        stream: daily
        os:
          - name: Ubuntu 24.04
            primary: true
            platforms:
              - linux/amd64
              - linux/arm64
          - name: Ubuntu 22.04
        overrideRegistries:
          - host: "ghcr.io"
            namespace: "posit-dev"
            repository: "workbench-preview"
    versions:
      - name: 2026.01.2+418.pro1
        subpath: '2026.01'
        latest: true
        os:
          - name: Ubuntu 22.04
          - name: Ubuntu 24.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.5.2
          - dependency: python
            version: 3.14.2
      - name: 2025.09.2+418.pro4
        subpath: '2025.09'
        os:
          - name: Ubuntu 22.04
            primary: true
          - name: Ubuntu 24.04
        dependencies:
          - dependency: R
            version: 4.5.1
          - dependency: python
            version: 3.13.7
  - name: workbench-session-init
    displayName: "Posit Workbench Session Init"
    description: "A containerized image for initializing Posit Workbench sessions."
    documentationUrl: "https://docs.posit.co/ide/server-pro/"
    devVersions:
      - sourceType: stream
        product: workbench-session
        stream: daily
        os:
          - name: Ubuntu 24.04
            primary: true
            platforms:
              - linux/amd64
              - linux/arm64
        overrideRegistries:
          - host: "ghcr.io"
            namespace: "posit-dev"
            repository: "workbench-session-init-preview"
    versions:
      - name: 2026.01.2+418.pro1
        subpath: '2026.01'
        latest: true
        os:
          - name: Ubuntu 24.04
            primary: true
      - name: 2025.09.2+418.pro4
        subpath: '2025.09'
        os:
          - name: Ubuntu 24.04
            primary: true
  - name: workbench-positron-init
    displayName: "Posit Workbench Positron Init"
    description: "A containerized image for initializing Positron IDE sessions in
      Posit Workbench."
    documentationUrl: "https://docs.posit.co/ide/server-pro/"
    matrix:
      namePattern: "{{ Dependencies.positron }}"
      dependencyConstraints:
        - dependency: positron
          constraint:
            latest: true
            count: 6
      os:
        - name: Ubuntu 24.04
          primary: true
          platforms:
            - linux/amd64
            - linux/arm64
  - name: workbench-session
    buildSecrets:
      - id: github_token
        envVar: GITHUB_TOKEN
    matrix:
      namePattern: "R{{ Dependencies.R }}-python{{ Dependencies.python }}"
      dependencyConstraints:
        - dependency: R
          constraint:
            min: "4.3"
            latest: true
        - dependency: python
          constraint:
            min: "3.11"
            latest: true
        - dependency: quarto
          constraint:
            latest: true
      os:
        - name: Ubuntu 24.04
          primary: true
          platforms:
            - linux/amd64
            - linux/arm64
        - name: Ubuntu 22.04
