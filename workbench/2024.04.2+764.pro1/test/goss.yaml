user:
  rstudio-server:
    exists: true
    uid: 999
    gid: 999

group:
  rstudio-server:
    exists: true
    gid: 999

package:
  rstudio-server:
    installed: true
  python-3.12.1:
    installed: true
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  r-4.4.0:
    installed: true
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  {{ $apt_package_list := readFile "/tmp/deps/packages.txt" | splitList "\n" }}
  {{- range $apt_package_list }}
  {{.}}:
    installed: true
  {{end}}
  {{ if eq .Env.IMAGE_TYPE "std" }}
  {{ $apt_package_list := readFile "/tmp/deps/optional_packages.txt" | splitList "\n" }}
  {{- range $apt_package_list }}
  {{.}}:
    installed: true
  {{end}}
  {{ end }}

port:
  tcp:8787:
    listening: true
    ip:
    - 0.0.0.0
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  tcp:5559:
    listening: true
    ip:
    - 127.0.0.1
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}

process:
  rserver:
    running: true
    skip: false
  rstudio-launche:
    running: true
    skip: false

file:
  # Check that license files were not accidentally included in build
  /etc/rstudio-server/license.lic:
    exists: false
  # Check that the RStudio Server installation directory exists
  /usr/lib/rstudio-server:
    exists: true
  # Check for rserver executable
  /usr/lib/rstudio-server/bin/rserver:
    exists: true
  # Check for rstudio-server executable
  /usr/lib/rstudio-server/bin/rstudio-server:
    exists: true
  # Check for rstudio-launcher executable
  /usr/lib/rstudio-server/bin/rstudio-launcher:
    exists: true
  # Check for rstudio-server monitor log directory
  /var/lib/rstudio-server/monitor/log:
    exists: true
    owner: rstudio-server
    group: rstudio-server
  # Check for code-server executable (path varies based on RStudio Workbench version)
  {{ $version_split := split "." "2024.04.2+764.pro1" }}
  {{ if or (ge ($version_split._0 | atoi) 2025) (and (ge ($version_split._0 | atoi) 2024) (ge ($version_split._1 | atoi) 7)) }}
  /usr/lib/rstudio-server/bin/pwb-code-server/bin/code-server:
    exists: true
  {{ else }}
  /usr/lib/rstudio-server/bin/code-server/bin/code-server:
    exists: true
  {{ end }}
  # Check that launcher jobs did not already initialize during build
  /var/lib/rstudio-launcher/Local/jobs/buildkitsandbox:
    exists: false
  # Check for vscode.conf and ensure VS Code is enabled
  /etc/rstudio/vscode.conf:
    exists: true
    contains:
      - "enabled: 1"
  # Check for startup.log and ensure it does not have an error when parsing rserver.conf
  /tmp/startup.log:
    exists: true
    contains:
    - "!Error reading /etc/rstudio/rserver.conf:"
  # Check pam configuration for mkhomedir
  /etc/pam.d/common-session:
    exists: true
    contains:
      - "/^session required pam_mkhomedir.so skel=/etc/skel umask=0027$/"
  # Check for sssd.conf
  /etc/sssd/sssd.conf:
    exists: true
    owner: root
    group: root
    mode: "0600"
  # Check for symlinked Quarto executable
  /usr/local/bin/quarto:
    exists: true
    filetype: symlink
  # Check for R installation
  /opt/R/4.4.0/bin/R:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: file
  /opt/R/default/bin/R:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: file
  /usr/local/bin/R:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: symlink
  /usr/local/bin/Rscript:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: symlink
  # Check for Python installation
  /opt/python/3.12.1/bin/python:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: file
  /opt/python/default/bin/python:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: file
  /opt/python/jupyter/bin/python:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: symlink
  /opt/python/jupyter/bin/jupyter:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  /usr/local/bin/jupyter:
    exists: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
    filetype: symlink

command:
  "Ensure rstudio-server has permissions to log directory":
    exec: su rstudio-server -c 'touch /var/lib/rstudio-server/monitor/log/rstudio-server.log'
    exit-status: 0
  "Ensure server log can be created":
    exec: touch /var/log/rstudio-server.log
    exit-status: 0
  "Verify Posit Workbench version":
    exec: /usr/lib/rstudio-server/bin/rstudio-server --version
    exit-status: 0
    stdout:
      - "2024.04.2+764.pro1"
      - "Workbench"
  "Verify Jupyter Notebook works":
    exec: "echo '{ \"cells\": [], \"metadata\": {}, \"nbformat\": 4, \"nbformat_minor\": 2}' | /opt/python/jupyter/bin/jupyter nbconvert --to notebook --stdin --stdout"
    timeout: 60000
    exit-status: 0
  "Verify R installation is version 4.4.0":
    exec: /opt/R/4.4.0/bin/R --version
    exit-status: 0
    stdout:
      - "R version 4.4.0"
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  "Verify Python installation is version 3.12.1":
    exec: /opt/python/3.12.1/bin/python --version
    exit-status: 0
    stdout:
      - "3.12.1"
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  "Verify Jupyter installation Python version":
    exec: /opt/python/jupyter/bin/python --version
    exit-status: 0
    stdout:
      - "3.12.1"
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}
  "Verify system OpenSSL":
    exec: which openssl
    exit-status: 0
    stdout:
      - "/usr/bin/openssl"
  "Verify Quarto":
    exec: /usr/local/bin/quarto check --quiet
    exit-status: 0
  "Verify Quarto has TinyTeX installed":
    exec: quarto list tools
    exit-status: 0
    stderr:
      - "/tinytex\\s+Up to date\\s+v\\d{4}\\.\\d{2}(\\.\\d{2})?\\s+v\\d{4}\\.\\d{2}(\\.\\d{2})?/"
    skip: {{ if eq .Env.IMAGE_TYPE "min" }}true{{ else }}false{{ end }}